name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build Docker image ────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/stoneoven-server:latest
            ${{ secrets.DOCKER_USERNAME }}/stoneoven-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to VPS via SSH ─────────────────────────────────────────────────
      # Requires GitHub Secrets:
      #   VPS_HOST        — server IP or hostname (e.g. api.stoneoven.in)
      #   VPS_USER        — SSH user (e.g. ubuntu)
      #   VPS_SSH_KEY     — private SSH key (PEM format)
      #   DOCKER_USERNAME — Docker Hub username
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/stoneoven-server:latest
            docker stop stoneoven-server || true
            docker rm stoneoven-server || true
            docker run -d \
              --name stoneoven-server \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /etc/stoneoven/server.env \
              ${{ secrets.DOCKER_USERNAME }}/stoneoven-server:latest
            docker image prune -f
