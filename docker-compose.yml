version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: stoneoven-server
    container_name: stoneoven-server
    ports:
      - '8080:8080'
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

