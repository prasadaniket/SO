# ===== DEVELOPMENT ENVIRONMENT =====

# PostgreSQL (local)
spring.datasource.url=jdbc:postgresql://localhost:5432/stoneoven_dev
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Redis (local)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Email (dev - use Mailtrap or skip)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=MAILTRAP_USERNAME
spring.mail.password=MAILTRAP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio (dev - use test credentials)
twilio.account.sid=ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
twilio.auth.token=your_test_auth_token
twilio.whatsapp.from=whatsapp:+14155238886
