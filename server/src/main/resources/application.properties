# Active profile (change to 'prod' for production)
spring.profiles.active=dev

# Server
server.port=8080

# JWT
jwt.secret=CHANGE_THIS_TO_A_256_BIT_RANDOM_SECRET_KEY_IN_PRODUCTION_MIN_32_CHARS
jwt.expiration=86400000

# CORS
cors.allowed.origins=http://localhost:3000,https://stoneoven.in,https://www.stoneoven.in

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.unicord.stoneoven=INFO
logging.level.org.springframework.security=WARN
