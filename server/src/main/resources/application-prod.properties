# ===== PRODUCTION ENVIRONMENT =====
# All sensitive values should be set as environment variables on the VPS
# e.g., export DB_PASSWORD=your_secure_password

# PostgreSQL (Hostinger VPS)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stoneoven}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Email (Resend via SMTP)
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# JWT (override with strong key in prod)
jwt.secret=${JWT_SECRET}

# CORS
cors.allowed.origins=https://stoneoven.in,https://www.stoneoven.in

# Logging
logging.level.com.unicord.stoneoven=WARN
logging.level.org.springframework=ERROR
